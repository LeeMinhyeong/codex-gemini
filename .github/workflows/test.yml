name: Test

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: node --check plugins/codex-gemini/scripts/gemini-bridge.js
      - run: node --check plugins/codex-gemini/scripts/gemini-watchdog.js
      - run: node --test tests/bridge-contract.test.js tests/bridge-lifecycle.test.js
